<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません｜Ballet Studio CONFY</title>
<meta name="description" content="お探しのページは見つかりませんでした。Ballet Studio CONFY 公式サイト。">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/BSC_logo_symbol.png">
<link rel="apple-touch-icon" href="/assets/BSC_logo_symbol.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1C1C1A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary: #428EDA;
    --text-dark: #1C1C1A;
    --text-mid: #3A3530;
    --text-muted: #6B645A;
    --bg-white: #F8F6F2;
    --bg-blue: #EFEAE0;
    --silver: #D8D2C4;
    --gold: #C9A961;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.85;
    color: var(--text-dark);
    background: var(--bg-white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  .container {
    max-width: 560px;
    text-align: center;
  }
  .label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 80px;
    color: var(--gold);
    line-height: 1;
    letter-spacing: 0.04em;
    margin-bottom: 24px;
    opacity: 0.6;
  }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 20px;
    letter-spacing: 0.04em;
  }
  p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 2.1;
    margin-bottom: 40px;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    font-size: 14px;
    letter-spacing: 0.04em;
    border: 1px solid var(--text-dark);
    color: var(--text-dark);
    text-decoration: none;
    transition: all 0.3s;
  }
  a:hover {
    background: var(--text-dark);
    color: var(--bg-white);
  }
  a.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  a.primary:hover {
    background: #2F73B8;
    border-color: #2F73B8;
  }
  @media (max-width: 480px) {
    .label { font-size: 60px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="label">404</div>
    <h1>お探しのページは見つかりませんでした</h1>
    <p>
      アドレスが変更されたか、削除された可能性があります。<br>
      お手数ですが、トップページから目的のページをお探しください。
    </p>
    <div class="actions">
      <a href="/" class="primary">トップページへ →</a>
      <a href="/#class">クラスを見る</a>
    </div>
  </div>
</body>
</html>
